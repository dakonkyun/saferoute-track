<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SafeRoute</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0A0E1A; color:#E8EDF8; font-family:-apple-system,sans-serif; min-height:100vh; }
    #map { width:100vw; height:60vh; }
    .info { padding:16px; }
    .card { background:#161D2E; border:1px solid #1E2A42; border-radius:12px; padding:14px; margin-bottom:10px; }
    .name { font-size:18px; font-weight:800; color:#00E5A0; }
    .dest { font-size:13px; color:#6B7A99; margin-top:4px; }
    .status { font-size:13px; margin-top:8px; color:#00E5A0; }
    .arrived { background:rgba(0,229,160,0.1); border-color:#00E5A0; text-align:center; padding:20px; }
    .arrived-text { font-size:20px; font-weight:900; color:#00E5A0; }
    .add-friend { text-align:center; padding:40px 20px; }
    .logo { font-size:60px; margin-bottom:20px; }
    .title { font-size:28px; font-weight:900; color:#00E5A0; margin-bottom:10px; }
    .subtitle { color:#6B7A99; margin-bottom:30px; font-size:14px; }
    .username-box { background:#161D2E; border:2px solid #00E5A0; border-radius:14px; padding:20px; margin:20px auto; max-width:400px; }
    .username { font-size:24px; font-weight:800; color:#fff; }
    .label { color:#6B7A99; font-size:12px; margin-bottom:8px; }
    .btn { background:#00E5A0; color:#000; padding:14px 24px; border-radius:12px; font-weight:800; font-size:14px; text-decoration:none; display:inline-block; margin-top:20px; }
    .btn-secondary { background:#161D2E; color:#00E5A0; border:1px solid #00E5A0; margin-left:10px; }
    .steps { text-align:left; max-width:400px; margin:30px auto; color:#6B7A99; font-size:13px; line-height:1.8; }
  </style>
</head>
<body>
  <div id="content"></div>

  <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDFbRf64kdI3hLqIx_HqTeVEfKufSyxz-c",
      authDomain: "saferoute-619e9.firebaseapp.com",
      projectId: "saferoute-619e9",
      storageBucket: "saferoute-619e9.firebasestorage.app",
      messagingSenderId: "991052476077",
      appId: "1:991052476077:web:954759074c7574dfb0a024"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const params = new URLSearchParams(window.location.search);
    const trackId = params.get('id');
    const username = params.get('username');

    if (username) {
      document.getElementById('content').innerHTML =
        '<div class="add-friend">' +
        '<div class="logo">🛡️</div>' +
        '<div class="title">SafeRoute</div>' +
        '<div class="subtitle">Добавь меня в друзья!</div>' +
        '<div class="username-box">' +
        '<div class="label">Мой username:</div>' +
        '<div class="username">@' + decodeURIComponent(username) + '</div>' +
        '</div>' +
       '<button id="addBtn" style="background:#00E5A0;color:#000;padding:16px 24px;border-radius:13px;font-weight:900;font-size:16px;border:none;cursor:pointer;margin-top:20px;display:block;width:100%;max-width:400px;margin-left:auto;margin-right:auto;">➕ Добавить @' + decodeURIComponent(username) + ' в друзья</button>' +
        '</div>';

      (function() {
        const PACKAGE = 'com.dakonkyun.SafeRoute';
        // Если приложение в Play Store — оставь как есть.
        // Если раздаёшь APK напрямую — впиши прямую ссылку на .apk вместо строки ниже.
        const FALLBACK = 'https://play.google.com/store/apps/details?id=' + PACKAGE;
        const intentUrl =
          'intent://add?username=' + encodeURIComponent(username) +
          '#Intent;scheme=saferoute;package=' + PACKAGE +
          ';S.browser_fallback_url=' + encodeURIComponent(FALLBACK) + ';end';
        document.getElementById('addBtn').onclick = function() {
          window.location.href = intentUrl;
        };
      })();
    } else if (trackId) {
      document.getElementById('content').innerHTML = '<div id="map" style="height:60vh"></div><div class="info"><div id="track-info" class="card">Загрузка...</div></div>';
      let map, marker;
      function initMap(lat, lng) {
        map = new google.maps.Map(document.getElementById('map'), {
          center: { lat, lng }, zoom: 15,
          styles: [
            {elementType:'geometry',stylers:[{color:'#0A0E1A'}]},
            {elementType:'labels.text.fill',stylers:[{color:'#6B7A99'}]},
            {featureType:'road',elementType:'geometry',stylers:[{color:'#1E2A42'}]},
            {featureType:'water',elementType:'geometry',stylers:[{color:'#060D1A'}]},
          ]
        });
        marker = new google.maps.Marker({
          position: { lat, lng }, map,
          icon: { path: google.maps.SymbolPath.CIRCLE, scale: 10, fillColor: '#00E5A0', fillOpacity: 1, strokeColor: '#fff', strokeWeight: 2 }
        });
      }
      db.collection('withme').doc(trackId).onSnapshot(doc => {
        if (!doc.exists) return;
        const data = doc.data();
        if (data.arrived) {
          document.getElementById('track-info').innerHTML =
            '<div class="arrived"><div style="font-size:36px">✅</div><div class="arrived-text">' + (data.username || 'Пользователь') + ' на месте!</div></div>';
          return;
        }
        document.getElementById('track-info').innerHTML =
          '<div class="name">🛡️ ' + (data.username || 'Пользователь') + '</div>' +
          '<div class="dest">📍 Идёт в: ' + (data.destination || '') + '</div>' +
          '<div class="status">● В пути — обновляется каждые 10 сек</div>';
      });
      db.collection('guard').onSnapshot(snap => {
        snap.forEach(doc => {
          const data = doc.data();
          if (data.latitude && data.longitude) {
            if (!map) initMap(data.latitude, data.longitude);
            else { marker.setPosition({ lat: data.latitude, lng: data.longitude }); map.setCenter({ lat: data.latitude, lng: data.longitude }); }
          }
        });
      });
    } else {
      document.getElementById('content').innerHTML =
        '<div class="add-friend"><div class="logo">🛡️</div><div class="title">SafeRoute</div><div class="subtitle">Безопасные маршруты Алматы</div></div>';
    }
  </script>
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyA-jUXyPQTf17mF2G5OVlbnish_PT1P-Ws&callback=Function.prototype"></script>
</body>
</html>
