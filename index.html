<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SafeRoute — Отслеживание</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0A0E1A; color:#E8EDF8; font-family:-apple-system,sans-serif; }
    #map { width:100vw; height:60vh; }
    .info { padding:16px; }
    .card { background:#161D2E; border:1px solid #1E2A42; border-radius:12px; padding:14px; margin-bottom:10px; }
    .name { font-size:18px; font-weight:800; color:#00E5A0; }
    .dest { font-size:13px; color:#6B7A99; margin-top:4px; }
    .status { font-size:13px; margin-top:8px; }
    .safe { color:#00E5A0; } .warn { color:#FFB547; }
    .arrived { background:rgba(0,229,160,0.1); border-color:#00E5A0; text-align:center; padding:20px; }
    .arrived-text { font-size:20px; font-weight:900; color:#00E5A0; }
    .loading { text-align:center; padding:40px; color:#6B7A99; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div class="info">
    <div id="content" class="loading">Загрузка...</div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDFbRf64kdI3hLqIx_HqTeVEfKufSyxz-c",
      authDomain: "saferoute-619e9.firebaseapp.com",
      projectId: "saferoute-619e9",
      storageBucket: "saferoute-619e9.firebasestorage.app",
      messagingSenderId: "991052476077",
      appId: "1:991052476077:web:954759074c7574dfb0a024"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const id = new URLSearchParams(window.location.search).get('id');
    let map, marker;

    function initMap(lat, lng) {
      map = new google.maps.Map(document.getElementById('map'), {
        center: { lat, lng },
        zoom: 15,
        styles: [
          {elementType:'geometry',stylers:[{color:'#0A0E1A'}]},
          {elementType:'labels.text.fill',stylers:[{color:'#6B7A99'}]},
          {featureType:'road',elementType:'geometry',stylers:[{color:'#1E2A42'}]},
          {featureType:'water',elementType:'geometry',stylers:[{color:'#060D1A'}]},
        ]
      });
      marker = new google.maps.Marker({
        position: { lat, lng },
        map,
        title: 'Пользователь',
        icon: {
          path: google.maps.SymbolPath.CIRCLE,
          scale: 10,
          fillColor: '#00E5A0',
          fillOpacity: 1,
          strokeColor: '#fff',
          strokeWeight: 2,
        }
      });
    }

    if (!id) {
      document.getElementById('content').innerHTML = '<div class="card"><p style="color:#FF4D6A">Ссылка недействительна</p></div>';
    } else {
      db.collection('withme').doc(id).onSnapshot(doc => {
        if (!doc.exists) return;
        const data = doc.data();
        const arrived = data.arrived;
        const username = data.username || 'Пользователь';
        const dest = data.destination || '';

        if (arrived) {
          document.getElementById('content').innerHTML =
            '<div class="card arrived"><div style="font-size:36px">✅</div><div class="arrived-text">' + username + ' на месте!</div><div class="dest" style="margin-top:6px">Прибыл(а) в ' + dest + '</div></div>';
          return;
        }

        document.getElementById('content').innerHTML =
          '<div class="card"><div class="name">🛡️ ' + username + '</div><div class="dest">📍 Идёт в: ' + dest + '</div><div class="status safe">● В пути — обновляется каждые 10 сек</div></div>' +
          '<div class="card"><div style="font-size:12px;color:#6B7A99">Если не нажмёт "Я на месте" вовремя — придёт тревожное уведомление</div></div>';
      });

      db.collection('guard').onSnapshot(snap => {
        snap.forEach(doc => {
          const data = doc.data();
          if (data.latitude && data.longitude) {
            const lat = data.latitude;
            const lng = data.longitude;
            if (!map) {
              initMap(lat, lng);
            } else {
              marker.setPosition({ lat, lng });
              map.setCenter({ lat, lng });
            }
          }
        });
      });
    }
  </script>
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyA-jUXyPQTf17mF2G5OVlbnish_PT1P-Ws&callback=Function.prototype"></script>
</body>
</html>
